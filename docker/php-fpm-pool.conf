; Pool php-fpm customizado do PitStop — controle de memoria
; Carregado depois do www.conf (zz-) e sobrescreve a pool [www].
; Objetivo: evitar OOM na VPS limitando processos simultaneos e
; reciclando workers ociosos para liberar RAM entre requisicoes.
[www]
; ondemand: workers sobem so quando ha requisicao e morrem apos ociosos
pm = ondemand
; teto de processos simultaneos (era 5 no default dynamic)
pm.max_children = 4
; mata worker ocioso apos 10s, devolvendo memoria ao sistema
pm.process_idle_timeout = 10s
; recicla o worker a cada 500 requisicoes (evita acumulo de memoria)
pm.max_requests = 500
